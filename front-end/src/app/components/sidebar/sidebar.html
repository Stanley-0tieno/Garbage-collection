<aside class="sidebar">

  <!-- Logo -->
  <div class="sidebar__logo">
    <img src="nav-logo.png" alt="Waste2Wealth" class="logo-img" />
    <button class="sidebar__close" (click)="closeRequest.emit()" aria-label="Close sidebar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <!-- User chip -->
  <div class="sidebar__user" *ngIf="user()">
    <div class="user-avatar">
      {{ user()!.firstName[0] }}{{ user()!.lastName[0] }}
    </div>
    <div class="user-info">
      <span class="user-name">{{ user()!.firstName }} {{ user()!.lastName }}</span>
      <span class="user-role">{{ isHousehold() ? '🏠 Household' : '🚛 Collector' }}</span>
    </div>
  </div>

  <!-- Nav -->
  <nav class="sidebar__nav">
    <p class="nav-label">Menu</p>

    <ng-container *ngIf="isHousehold()">
      <a *ngFor="let link of householdLinks"
         [routerLink]="link.path"
         routerLinkActive="active"
         class="nav-item"
         (click)="closeRequest.emit()">
        <span class="nav-icon">
          <ng-container [ngSwitch]="link.icon">
            <svg *ngSwitchCase="'home'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            <svg *ngSwitchCase="'calendar'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <svg *ngSwitchCase="'history'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>
          </ng-container>
        </span>
        <span class="nav-label-text">{{ link.label }}</span>
      </a>
    </ng-container>

    <ng-container *ngIf="!isHousehold()">
      <a *ngFor="let link of collectorLinks"
         [routerLink]="link.path"
         routerLinkActive="active"
         class="nav-item"
         (click)="closeRequest.emit()">
        <span class="nav-icon">
          <ng-container [ngSwitch]="link.icon">
            <svg *ngSwitchCase="'home'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            <svg *ngSwitchCase="'list'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1" fill="currentColor"/><circle cx="3" cy="12" r="1" fill="currentColor"/><circle cx="3" cy="18" r="1" fill="currentColor"/></svg>
            <svg *ngSwitchCase="'user'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </ng-container>
        </span>
        <span class="nav-label-text">{{ link.label }}</span>
      </a>
    </ng-container>
  </nav>

  <!-- Footer -->
  <div class="sidebar__footer">
    <div class="eco-badge" *ngIf="isHousehold()">
      <span>🌍</span>
      <span>You're helping the planet!</span>
    </div>
    <button class="logout-btn" (click)="logout()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      <span>Logout</span>
    </button>
  </div>

</aside>
